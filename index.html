<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jairo Prieto | Century 21 Bonanza Terminal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --navy: #0a192f;
            --gold: #c5a059;
            --white: #ffffff;
            --glass: rgba(15, 23, 42, 0.85);
            --glass-border: rgba(255, 255, 255, 0.1);
            --slate: #8892b0;
        }

        body { 
            background-color: #020617; 
            background-image: linear-gradient(rgba(2, 6, 23, 0.7), rgba(2, 6, 23, 0.9)),
                url('https://images.unsplash.com/photo-1486406146926-c627a92ad1ab?auto=format&fit=crop&w=1500&q=80');
            background-size: cover; background-attachment: fixed; background-position: center;
            font-family: 'Inter', -apple-system, sans-serif; color: var(--white);
            min-height: 100vh; display: flex; align-items: center; justify-content: center; margin: 0;
        }

        .glass-terminal {
            background: var(--glass); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border); border-radius: 24px;
            padding: 50px 40px; max-width: 850px; width: 95%;
            box-shadow: 0 25px 50px rgba(0,0,0,0.6); margin: 20px;
        }

        .brand-header { 
            font-size: 0.85rem; letter-spacing: 5px; color: var(--gold); 
            text-transform: uppercase; margin-bottom: 30px; font-weight: 800; 
            text-shadow: 0 0 10px rgba(197, 160, 89, 0.3);
        }

        h1 { font-size: 2.8rem; font-weight: 800; margin-bottom: 30px; line-height: 1.1; letter-spacing: -1px; }
        .highlight { color: var(--gold); }

        /* Contenedor de pasos */
        .step-container { display: none; text-align: left; animation: fadeIn 0.4s ease; }
        .step-container.active { display: block; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .question-title { font-size: 1.3rem; font-weight: 700; margin-bottom: 25px; color: var(--white); border-left: 4px solid var(--gold); padding-left: 15px; }

        /* Opciones */
        .option-card {
            background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border);
            border-radius: 12px; padding: 18px; margin-bottom: 12px; cursor: pointer;
            transition: 0.3s; display: flex; align-items: center;
        }
        .option-card:hover { border-color: var(--gold); background: rgba(197, 160, 89, 0.1); transform: translateX(5px); }
        .option-card b { color: var(--gold); display: block; margin-bottom: 2px; font-size: 1rem; text-transform: uppercase; }
        .option-card span { font-size: 0.85rem; color: var(--slate); font-weight: 500; }
