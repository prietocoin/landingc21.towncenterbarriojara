    <p class="text-gray-500 text-sm tracking-widest uppercase mb-10 max-w-sm mx-auto">Haz clic para recibir tu diagnóstico y hoja de ruta estratégica por WhatsApp.</p>

    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const n = urlParams.get('nombre') || 'Inversor';
        const o = urlParams.get('objetivo') || 'Plusvalía';
        const r = urlParams.get('rango') || 'Inversion';
        const z = urlParams.get('zona') || 'Asunción';
        const t = urlParams.get('timing') || 'Inmediato';
        
        const message = `Hola Jairo, soy ${n}. Validé mi perfil Alpha en la terminal:
- Objetivo: ${o}
- Rango: ${r}
- Zona: ${z}
- Timing: ${t}
Deseo mi hoja de ruta estratégica para TownCenter.`;
